version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      # reqwest 0.13 removed the rustls-tls feature (breaking); revisit after
      # migrating to the 0.13 rustls provider model.
      - dependency-name: "reqwest"
        versions: [">=0.13.0"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
