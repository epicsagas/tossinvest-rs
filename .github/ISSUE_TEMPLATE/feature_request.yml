name: ✨ 기능 제안
description: 새 엔드포인트 지원이나 개선 아이디어를 제안합니다
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하고 싶은 문제
      description: 이 기능이 왜 필요한지 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
