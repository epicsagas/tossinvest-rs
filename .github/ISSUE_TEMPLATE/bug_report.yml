name: 🐛 버그 리포트
description: SDK 동작 중 발생한 버그를 신고합니다
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        tossinvest-rs 사용 중 발생한 버그를 알려주세요. 보안 취약점은 [SECURITY.md](../SECURITY.md)의 비공개 채널을 이용해 주세요.
  - type: textarea
    id: what-happened
    attributes:
      label: 발생한 문제
      description: 어떤 일이 있었는지 설명해 주세요.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tossinvest-rs 버전
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 방법
      description: 최소 재현 코드를 포함해 주세요.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
